{{ define "main" }}
{{ if eq .Section "portfolio" }}
<section class="project-grid" role="list" aria-label="All projects">
  {{ range .Pages.ByWeight }}
  <a href="{{ .RelPermalink }}" class="project-card reveal" role="listitem">
    <div class="project-card-image">
      {{ with .Params.cover }}
      <img src="{{ (printf "images/portfolio/%s" .) | relURL }}" alt="{{ $.Title }}" loading="lazy">
      {{ end }}
      <div class="project-card-overlay">
        <span class="project-card-line"></span>
        <span class="project-card-code">{{ .Params.code }}</span>
        <h2 class="project-card-title">{{ .Title }}</h2>
        <p class="project-card-desc">{{ .Params.description }}</p>
        <span class="project-card-cat">{{ .Params.category }}</span>
      </div>
    </div>
  </a>
  {{ end }}
</section>
{{ end }}
{{ end }}
